<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hearts"></div>

<!-- ================= SCREEN 1 ================= -->

<section id="screen1" class="screen">

<div class="glass">

<h1 class="introTitle">

Hey Beautiful ❤️

</h1>

<p class="introText">

I have something to ask you...

</p>

<button id="continueBtn">

Continue 💌

</button>

</div>

</section>

<!-- ================= SCREEN 2 ================= -->

<section id="screen2" class="screen hide">

<div class="glass">

<h1 id="typeTitle"></h1>

<p>

Every moment with you has become

one of my favourite memories.

<br><br>

So today...

I'm finally asking the question

my heart has been waiting to ask.

</p>

<div class="btnArea">

<button id="yes">

YES ❤️

</button>

<button id="no">

NO 🙈

</button>

</div>

</div>

</section>

<!-- ================= POPUP ================= -->

<div id="popup">

<div class="popupCard">

<h2>

❤️ She Said YES ❤️

</h2>

<p>

Choose your chocolate 🍫

</p>

<div class="giftArea">

<div class="gift" id="kitkat">

<img src="kitkat.jpg">

<h3>

KitKat

</h3>

</div>

<div class="gift glow" id="cadbury">

<img src="dairy milk.webp">

<h3>

Cadbury Dairy Milk

</h3>

</div>

</div>

<div id="chocoMessage">

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
