<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hearts"></div>

<!-- Screen 1 -->

<div id="screen1" class="card">

<h1>Hey... ❤️</h1>

<p>

I have something to ask you...

</p>

<button id="continueBtn">

Continue 💌

</button>

</div>

<!-- Screen 2 -->

<div id="screen2" class="card hide">

<h1 id="title"></h1>

<p>

Every moment with you has become one of my favourite memories.

<br><br>

So today...

I'm finally asking the question my heart has been waiting to ask.

</p>

<div class="buttons">

<button id="yes">

YES ❤️

</button>

<button id="no">

NO 🙈

</button>

</div>

</div>

<!-- Celebration Popup -->

<div id="popup">

<div class="popupCard">

<h2>

YAYYYYY!! ❤️🥹

</h2>

<div class="giftContainer">

<div class="gift">

<img src="kitkat.jpg">

<p>KitKat</p>

</div>

<div class="gift">

<img src="dairy milk.webp">

<p>Cadbury Dairy Milk</p>

</div>

</div>

<p id="message">

You just made my heart the happiest it has ever been. ❤️

</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
